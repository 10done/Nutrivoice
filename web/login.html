<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriVoice | Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>body { font-family: Inter, sans-serif; }</style>
</head>
<body class="bg-[#0c141c] text-[#dbe3ef] min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md space-y-6">
    <div class="text-center">
      <h1 class="text-3xl font-extrabold text-[#66d9cc]" style="font-family: Manrope, sans-serif">NutriVoice</h1>
      <p class="text-sm text-[#bec8c9] mt-1">Clinical nutrition logging</p>
    </div>
    <div class="flex gap-2 rounded-xl bg-[#182029] p-1">
      <button type="button" id="tab-login" class="flex-1 py-2 rounded-lg bg-[#66d9cc] text-[#003732] font-bold text-sm">Sign in</button>
      <button type="button" id="tab-register" class="flex-1 py-2 rounded-lg text-[#bec8c9] font-medium text-sm">Register</button>
    </div>
    <p id="auth-msg" class="text-sm text-red-300 min-h-[1.25rem]"></p>
    <form id="form-login" class="space-y-4 bg-[#232b33] rounded-2xl p-8 border border-[#2e363e]/50">
      <div>
        <label class="text-xs uppercase tracking-wider text-[#bec8c9]">Email</label>
        <input id="login-email" type="email" required class="mt-1 w-full rounded-xl bg-[#0c141c] border border-[#2e363e] px-4 py-3 text-sm" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-[#bec8c9]">Password</label>
        <input id="login-password" type="password" required minlength="8" class="mt-1 w-full rounded-xl bg-[#0c141c] border border-[#2e363e] px-4 py-3 text-sm" />
      </div>
      <button type="submit" class="w-full py-3 rounded-xl font-bold bg-gradient-to-br from-[#66d9cc] to-[#006159] text-[#003732]">Continue</button>
    </form>
    <form id="form-register" class="hidden space-y-4 bg-[#232b33] rounded-2xl p-8 border border-[#2e363e]/50">
      <div>
        <label class="text-xs uppercase tracking-wider text-[#bec8c9]">Email</label>
        <input id="register-email" type="email" required class="mt-1 w-full rounded-xl bg-[#0c141c] border border-[#2e363e] px-4 py-3 text-sm" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-[#bec8c9]">Password (8+ chars)</label>
        <input id="register-password" type="password" required minlength="8" class="mt-1 w-full rounded-xl bg-[#0c141c] border border-[#2e363e] px-4 py-3 text-sm" />
      </div>
      <button type="submit" class="w-full py-3 rounded-xl font-bold bg-gradient-to-br from-[#66d9cc] to-[#006159] text-[#003732]">Create account</button>
    </form>
  </div>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
