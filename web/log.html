<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriVoice | Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>body { font-family: Inter, sans-serif; }</style>
</head>
<body class="bg-[#0c141c] text-[#dbe3ef] min-h-screen overflow-x-hidden">
  <header class="fixed top-0 left-0 right-0 h-14 z-40 bg-[#0c141c] border-b border-[#232b33]/40 flex items-center justify-between px-6 lg:pl-[calc(16rem+1.5rem)]">
    <span class="text-lg font-bold text-[#66d9cc]" style="font-family: Manrope">NutriVoice</span>
    <a href="/index.html" class="text-sm text-[#bec8c9] hover:text-white">Dashboard</a>
  </header>
  <aside class="hidden lg:flex fixed left-0 top-0 h-full w-64 z-30 bg-[#070f17] border-r border-[#232b33]/40 flex-col pt-20 pb-8">
    <nav class="flex-1 space-y-1 px-4">
      <a href="/index.html" class="block rounded-xl px-4 py-3 text-xs font-bold uppercase text-[#bec8c9] hover:bg-[#232b33]/50">Home</a>
      <a href="/log.html" class="block rounded-xl px-4 py-3 text-xs font-bold uppercase bg-[#232b33] text-[#66d9cc]">Log</a>
      <a href="/insights.html" class="block rounded-xl px-4 py-3 text-xs font-bold uppercase text-[#bec8c9] hover:bg-[#232b33]/50">Insights</a>
      <a href="/settings.html" class="block rounded-xl px-4 py-3 text-xs font-bold uppercase text-[#bec8c9] hover:bg-[#232b33]/50">Settings</a>
    </nav>
  </aside>
  <main class="min-h-screen w-full lg:ml-64 lg:w-[calc(100%-16rem)] max-w-none pt-24 px-6 sm:px-8 lg:px-10 xl:px-12 pb-24">
    <h1 class="text-3xl font-extrabold mb-2" style="font-family: Manrope">Voice &amp; text log</h1>
    <p id="log-status" class="text-sm text-[#66d9cc] mb-6 min-h-[1.25rem]"></p>

    <section class="mb-10 rounded-2xl border border-[#2e363e]/60 bg-[#232b33] p-6 shadow-lg shadow-black/20">
      <h2 class="text-lg font-bold text-[#dbe3ef] mb-1" style="font-family: Manrope">What I ate today (text)</h2>
      <p class="text-sm text-[#bec8c9] mb-4">Describe foods in plain language — same as voice, without the mic.</p>
      <form id="form-text-meal" class="space-y-4">
        <div>
          <label for="meal-text" class="text-xs uppercase tracking-wider text-[#bec8c9] font-bold">Meal description</label>
          <textarea
            id="meal-text"
            name="meal"
            rows="5"
            required
            class="mt-2 w-full rounded-xl bg-[#141c24] border border-[#2e363e] px-4 py-3 text-sm text-[#dbe3ef] placeholder:text-[#889393] focus:ring-2 focus:ring-[#66d9cc]/40 focus:border-[#66d9cc]/50"
            placeholder="e.g. I had two boiled eggs, a bowl of poha, and black coffee for breakfast"
          ></textarea>
        </div>
        <div class="flex flex-wrap gap-3">
          <button type="submit" id="btn-save-text" class="px-8 py-3 rounded-xl font-bold bg-gradient-to-br from-[#66d9cc] to-[#006159] text-[#003732]">
            Log meal
          </button>
          <button type="reset" class="px-6 py-3 rounded-xl font-medium bg-[#2e363e] text-[#bec8c9] hover:text-[#dbe3ef]">Clear</button>
        </div>
      </form>
    </section>

    <h2 class="text-sm font-bold uppercase tracking-widest text-[#bec8c9] mb-3">Voice</h2>
    <div class="flex flex-wrap gap-3 mb-6">
      <button type="button" id="btn-mic" class="px-6 py-3 rounded-xl font-bold bg-gradient-to-br from-[#66d9cc] to-[#006159] text-[#003732]">Start recording</button>
      <button type="button" id="btn-stop" class="hidden px-6 py-3 rounded-xl font-bold bg-[#2e363e] text-[#dbe3ef]">Stop</button>
    </div>
    <p class="text-xs text-[#bec8c9] mb-2">Last saved / transcript</p>
    <div id="transcript-display" class="min-h-[4rem] mb-8 p-4 rounded-xl bg-[#232b33] border border-[#2e363e]/50"></div>

    <section class="rounded-2xl border border-[#2e363e]/60 bg-[#182029] p-6">
      <h3 class="text-xs uppercase tracking-widest text-[#66d9cc] font-bold mb-3">Today's running total</h3>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div class="rounded-xl bg-[#141c24] border border-[#2e363e]/40 p-4 text-center">
          <div id="log-today-kcal" class="text-2xl font-black text-[#66d9cc]">—</div>
          <div class="text-[10px] uppercase font-bold text-[#bec8c9] mt-1">kcal</div>
        </div>
        <div class="rounded-xl bg-[#141c24] border border-[#2e363e]/40 p-4 text-center">
          <div id="log-today-p" class="text-2xl font-black text-[#dbe3ef]">—</div>
          <div class="text-[10px] uppercase font-bold text-[#bec8c9] mt-1">protein g</div>
        </div>
        <div class="rounded-xl bg-[#141c24] border border-[#2e363e]/40 p-4 text-center">
          <div id="log-today-c" class="text-2xl font-black text-[#dbe3ef]">—</div>
          <div class="text-[10px] uppercase font-bold text-[#bec8c9] mt-1">carbs g</div>
        </div>
        <div class="rounded-xl bg-[#141c24] border border-[#2e363e]/40 p-4 text-center">
          <div id="log-today-f" class="text-2xl font-black text-[#dbe3ef]">—</div>
          <div class="text-[10px] uppercase font-bold text-[#bec8c9] mt-1">fat g</div>
        </div>
      </div>
      <p id="log-today-goal-hint" class="text-xs text-[#bec8c9] mt-4 text-center"></p>
    </section>
  </main>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/log.js"></script>
</body>
</html>
